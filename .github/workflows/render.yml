name: render-figures

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install vtk numpy
      - name: render
        run: python scripts/python/render_figures.py
      - name: copy renders to docs
        run: cp assets/renders/*.png docs/assets/
      - name: commit refreshed figures
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git add docs/assets assets/renders assets/data || true
          git diff --cached --quiet || git commit -m "ci: regenerate portfolio figures"
          git push || true
